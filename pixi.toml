[project]
name = "flaxchat"
version = "0.1.0"
description = "Minimal LLM training harness for TPUs built on JAX/Flax NNX"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
python = ">=3.11,<3.14"

[pypi-dependencies]
flaxchat = { path = ".", editable = true }
jax = ">=0.6.0"
jaxlib = ">=0.6.0"
flax = ">=0.11.0"
optax = ">=0.2.4"
orbax-checkpoint = ">=0.11.0"
pyarrow = ">=18.0.0"
pyyaml = ">=6.0"
filelock = ">=3.0"
pytest = ">=8.0.0"
kgz = { path = "../kgz", editable = true }
ai-edge-litert = ">=2.1.3, <3"
datasets = ">=4.8.4, <5"
rustbpe = ">=0.1.0, <0.2"
tiktoken = ">=0.12.0, <0.13"
transformers = ">=5.5.0, <6"
huggingface-hub = ">=1.9.2, <2"
matplotlib = ">=3.10.8, <4"
tpuz = ">=0.1.11, <0.2"
nmn = ">=0.2.28"
torch = ">=2.11.0, <3"

[tasks]
test = "pytest tests/ -v"
test-quick = "pytest tests/ -v -k 'not slow'"
pretrain = "python -m scripts.pretrain"
