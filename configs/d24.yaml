# flaxchat config: depth-24 model (~1.6B params)
# Designed for TPU v4-32 or v5e-8 pods

model:
  sequence_len: 2048
  vocab_size: 32768
  n_layer: 24
  n_head: 12
  n_kv_head: 12
  n_embd: 1536
  window_pattern: "SSSL"

training:
  target_param_data_ratio: 12
  device_batch_size: 32
  total_batch_size: -1  # auto-compute
  embedding_lr: 0.3
  unembedding_lr: 0.008
  matrix_lr: 0.02
  scalar_lr: 0.5
  weight_decay: 0.28
  warmup_steps: 40
  warmdown_ratio: 0.65
  final_lr_frac: 0.05
  eval_every: 250
  sample_every: 2000
  save_every: -1

tpu:
  precision: "bf16"
  data_parallel: -1
  fsdp: 1
  tensor_parallel: 1

checkpoint:
  max_to_keep: 3
  async_checkpointing: true

logging:
  run_name: "d24-pretrain"
  wandb_project: "flaxchat"
